<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudBot — IA dans le Cloud</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2229;
      --border: #2a2f3a;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8eaf0;
      --muted: #7a8090;
      --user-bubble: #6c63ff;
      --bot-bubble: #1e2229;
      --radius: 16px;
      --font: 'DM Sans', sans-serif;
      --mono: 'Space Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-text h1 {
      font-size: 16px; font-weight: 600; letter-spacing: -0.3px;
    }
    .header-text span {
      font-size: 12px; color: var(--muted); font-family: var(--mono);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; margin-left: auto;
      box-shadow: 0 0 8px #22c55e88;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* Model badge */
    .model-badge {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      color: var(--accent2);
    }

    /* Chat container */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Messages */
    .message {
      display: flex;
      gap: 12px;
      max-width: 760px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px); }
      to { opacity:1; transform: translateY(0); }
    }
    .message.user { margin-left: auto; flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0; margin-top: 2px;
    }
    .message.user .avatar { background: var(--user-bubble); }
    .message.bot .avatar { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 14.5px;
      max-width: calc(100% - 48px);
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble code {
      font-family: var(--mono);
      font-size: 12.5px;
      background: #0a0c10;
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent2);
    }
    .bubble pre {
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
    }
    .bubble pre code { background: none; padding: 0; color: #a8d8a8; }

    /* Typing indicator */
    .typing .bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 16px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(1)} 40%{transform:scale(1.4)} }

    /* Welcome screen */
    #welcome {
      margin: auto;
      text-align: center;
      padding: 40px 20px;
    }
    #welcome .big-icon {
      font-size: 56px;
      display: block;
      margin-bottom: 16px;
    }
    #welcome h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    #welcome p { color: var(--muted); font-size: 14px; max-width: 360px; margin: 0 auto 28px; }
    .suggestions {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    }
    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .suggestion-btn:hover {
      border-color: var(--accent);
      background: var(--surface);
    }

    /* Input area */
    footer {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 800px;
      margin: 0 auto;
    }
    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 14.5px;
      padding: 12px 16px;
      border-radius: 12px;
      resize: none;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none; border-radius: 12px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #5753d4; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    #reset-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 44px; height: 44px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      transition: border-color 0.2s, color 0.2s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #reset-btn:hover { border-color: #ef4444; color: #ef4444; }

    .input-hint {
      text-align: center; font-size: 11px;
      color: var(--muted); margin-top: 8px;
      font-family: var(--mono);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div class="header-text">
    <h1>CloudBot</h1>
    <span>Plateforme IA open source</span>
  </div>
  <span class="model-badge" id="model-label">tinyllama</span>
  <div class="status-dot" id="status-dot" title="En ligne"></div>
</header>

<div id="chat-container">
  <div id="welcome">
    <span class="big-icon">🧠</span>
    <h2>Bonjour, je suis CloudBot</h2>
    <p>Un assistant IA déployé sur infrastructure cloud open source. Posez-moi n'importe quelle question !</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('Explique-moi le cloud computing en 3 points')">☁️ C'est quoi le cloud ?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Écris un script Python pour lire un fichier CSV')">🐍 Script Python CSV</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Quels sont les avantages de Docker ?')">🐳 Docker & conteneurs</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Comment fonctionne un reverse proxy ?')">🔀 Reverse proxy</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <button id="reset-btn" title="Réinitialiser la conversation" onclick="resetConversation()">🗑</button>
    <textarea id="user-input" rows="1" placeholder="Écrivez votre message..."></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Envoyer">➤</button>
  </div>
  <p class="input-hint">Entrée pour envoyer · Shift+Entrée pour nouvelle ligne</p>
</footer>

<script>
  const SESSION_KEY = 'cloudbot_session';
  let sessionId = localStorage.getItem(SESSION_KEY) || crypto.randomUUID();
  localStorage.setItem(SESSION_KEY, sessionId);

  const chatContainer = document.getElementById('chat-container');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  let isLoading = false;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function getWelcome() { return document.getElementById('welcome'); }

  function appendMessage(role, content) {
    const welcome = getWelcome();
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatContent(content);

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return bubble;
  }

  function formatContent(text) {
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`
    );
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showTyping() {
    const welcome = getWelcome();
    if (welcome) welcome.remove();
    const msg = document.createElement('div');
    msg.className = 'message bot typing';
    msg.id = 'typing-indicator';
    msg.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        appendMessage('bot', `❌ Erreur : ${data.error}`);
      } else {
        appendMessage('bot', data.reply);
      }
    } catch (err) {
      removeTyping();
      appendMessage('bot', '❌ Impossible de joindre le serveur. Vérifiez que les conteneurs sont bien démarrés.');
    }

    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }

  function sendSuggestion(text) {
    input.value = text;
    sendMessage();
  }

  async function resetConversation() {
    await fetch(`/api/reset/${sessionId}`, { method: 'DELETE' });
    chatContainer.innerHTML = `
      <div id="welcome">
        <span class="big-icon">🧠</span>
        <h2>Conversation réinitialisée</h2>
        <p>Commençons une nouvelle discussion !</p>
      </div>`;
  }

  // Check server health
  async function checkHealth() {
    try {
      const r = await fetch('/health');
      const d = await r.json();
      document.getElementById('model-label').textContent = d.model || 'model';
      document.getElementById('status-dot').style.background = '#22c55e';
    } catch {
      document.getElementById('status-dot').style.background = '#ef4444';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);
</script>
</body>
</html>
